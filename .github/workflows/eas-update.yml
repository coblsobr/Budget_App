name: EAS Update (publish to phone)

# Every push to the main branch publishes an over-the-air update to the
# "preview" channel — the same channel the installed APK listens on. Your phone
# pulls it the next time you open the app. No PC required.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger it manually from GitHub too
  schedule:
    # Runs at 06:00 UTC on the 1st of every month — refreshes net-worth history
    # from the latest "Priorities - Finances.csv" (captures the month that just ended).
    - cron: '0 6 1 * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Rebuild net-worth history from CSV
        run: node scripts/build-history.mjs

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive
